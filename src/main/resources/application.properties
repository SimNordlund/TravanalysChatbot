spring.application.name=amortization-helper

server.port=8081

# OpenAI Chat Configuration
spring.ai.openai.chat.enabled=true
spring.ai.model.chat=openai
spring.ai.openai.chat.options.temperature=0

#spring.ai.openai.chat.options.maxTokens=100
spring.ai.openai.chat.options.maxCompletionTokens=1500
spring.ai.openai.chat.options.model=gpt-5.4

spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}

spring.ai.model.embedding=openai
spring.ai.openai.embedding.model=text-embedding-3-large
#spring.ai.openai.embedding.model=text-embedding-ada-002

# Testing Path
#vectorstore.filepath=temp/vectorstore.json

# Production path (Docker/Render)
vectorstore.filepath=/tmp/vectorstore.json

logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=DEBUG
logging.level.org.springframework.ai=DEBUG

spring.ai.retry.enabled=true
spring.ai.retry.max-attempts=5
spring.ai.retry.backoff.initial-interval=2s
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=30s
spring.ai.retry.on-http-codes=429,502,504

logging.level.org.springframework.ai.rag=DEBUG
logging.level.root=INFO
logging.level.org.example.amortizationhelper=INFO

spring.jpa.hibernate.ddl-auto=validate
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.ai.model.audio.transcription=openai
spring.ai.openai.audio.transcription.options.model=gpt-4o-transcribe
spring.ai.openai.audio.transcription.options.response-format=text
spring.ai.openai.audio.transcription.options.language=sv
spring.ai.openai.audio.transcription.options.temperature=0

spring.ai.model.audio.speech=openai
spring.ai.openai.audio.speech.options.model=gpt-4o-mini-tts
spring.ai.openai.audio.speech.options.voice=ash
spring.ai.openai.audio.speech.options.response-format=wav
spring.ai.openai.audio.speech.options.speed=1

spring.servlet.multipart.max-request-size=25MB
spring.servlet.multipart.max-file-size=25MB

app.openai.web-search.model=gpt-5.4

# spring.ai.openai.chat.options.safety-identifier
spring.ai.openai.chat.options.parallel-tool-calls=true

# Cache down below
spring.ai.openai.chat.options.prompt-cache-key=travolta-chat-v1

# Mail config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties[mail.smtp.auth]=true
spring.mail.properties[mail.smtp.starttls.enable]=true
spring.mail.properties[mail.smtp.connectiontimeout]=5000
spring.mail.properties[mail.smtp.timeout]=3000
spring.mail.properties[mail.smtp.writetimeout]=5000

app.mail.from=${MAIL_FROM:${MAIL_USERNAME}}


#MCP
spring.ai.mcp.client.type=SYNC

spring.ai.mcp.client.toolcallback.enabled=true

spring.ai.mcp.client.initialized=false

spring.ai.mcp.client.request-timeout=60s

#For linux npx is needed when hosted in a container otherwise for local testing use npx

spring.ai.mcp.client.stdio.connections.weather.command=npx

spring.ai.mcp.client.stdio.connections.weather.args[0]=-y

spring.ai.mcp.client.stdio.connections.weather.args[1]=-p

spring.ai.mcp.client.stdio.connections.weather.args[2]=open-meteo-mcp-server

spring.ai.mcp.client.stdio.connections.weather.args[3]=open-meteo-mcp-server

